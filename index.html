}

}

function weekExecutionSummary(w){

 const completed=sessions.filter(s=>s.execution?.completed).length;

const DAY_INDEX={Lun:0,Mar:1,Mer:2,Jeu:3,Ven:4,Sam:5,Dim:6};
function sessionStimuli(s){return [...new Set([s.domain,...(s.extraDomains||[])].filter(Boolean))]}
function sessionIntensityClass(s){
 const id=s.templateId||'',title=(s.title||'').toLowerCase();
 if(['maxhang','climbmax','kilterintense','pullstrength','dipstrength','repeaters'].includes(id))return 'HIGH';
 if(title.includes('maximal')||title.includes('force')||title.includes('fractionné')||title.includes('seuil'))return 'HIGH';
 if(id==='climbfun'||id==='flexibility'||s.autoFlex)return 'LOW';
 return 'MODERATE'
}
function minRecoveryHours(a,b){
 const A=sessionStimuli(a),B=sessionStimuli(b);
 const complementaryUpper=(A.includes('A_PULL')&&B.includes('A_PUSH'))||(A.includes('A_PUSH')&&B.includes('A_PULL'));
 if(complementaryUpper)return 0;
 if(!A.some(x=>B.includes(x)))return 0;
 if(A.includes('B')||A.includes('BM')||A.includes('ESC')||A.includes('A_PULL')||A.includes('A_PUSH'))return 48;
 if(A.includes('D'))return sessionIntensityClass(a)==='HIGH'||sessionIntensityClass(b)==='HIGH'?48:24;
 return 24
}
function countStimulus(w,stim){
 return (w.sessions||[]).filter(s=>{
   if(!sessionStimuli(s).includes(stim))return false;
   if(stim==='SOUP')return true;
   return !s.autoFlex
 }).length
}
function g21Bounds(){return {ESC:[3,4],BM:[1,2],A_PULL:[1,4],A_PUSH:[1,4],B:[1,4],D:[2,4],C:[1,3],CALI:[1,3],SOUP:[7,14],MOB:[1,3],PREV:[1,3]}}
function evaluateG21Week(w){
 const alerts=[],sessions=w.sessions||[],bounds=g21Bounds();
 Object.entries(bounds).forEach(([stim,[min,max]])=>{
  const n=countStimulus(w,stim);
  if(n<min){
   const severity=['ESC','D','B'].includes(stim)&&n===0?'critical':'warning';
   alerts.push({severity,rule:`G21 · ${stim} minimum`,reason:`${n} stimulus planifié pour une cible de ${min} à ${max}.`,action:`Ajouter ${min-n} stimulus ${stim} ou documenter une adaptation volontaire.`})
  } else if(n>max) alerts.push({severity:'warning',rule:`G21 · ${stim} maximum`,reason:`${n} stimuli planifiés pour une limite de ${max}.`,action:`Retirer, fusionner ou alléger ${n-max} stimulus.`})
 });
 const ordered=sessions.filter(s=>DAY_INDEX[s.day]!==undefined&&!s.autoFlex).sort((a,b)=>DAY_INDEX[a.day]-DAY_INDEX[b.day]);
 for(let i=0;i<ordered.length;i++)for(let j=i+1;j<ordered.length;j++){
  const a=ordered[i],b=ordered[j],req=minRecoveryHours(a,b),gap=(DAY_INDEX[b.day]-DAY_INDEX[a.day])*24;
  if(req&&gap<req)alerts.push({severity:sessionIntensityClass(a)==='HIGH'&&sessionIntensityClass(b)==='HIGH'?'critical':'warning',rule:'G21 · TMR',reason:`${a.title} (${a.day}) puis ${b.title} (${b.day}) : ${gap} h pour ${req} h recommandées.`,action:'Déplacer une séance ou réduire son intensité.'})
 }
 const byDay={};sessions.filter(s=>!s.autoFlex).forEach(s=>(byDay[s.day]||(byDay[s.day]=[])).push(s));
 Object.entries(byDay).forEach(([day,list])=>{
  const high=list.filter(s=>sessionIntensityClass(s)==='HIGH');
  const onlyComplementaryUpper=high.length===2&&high.some(s=>sessionStimuli(s).includes('A_PULL'))&&high.some(s=>sessionStimuli(s).includes('A_PUSH'));
  if(high.length>=2&&!onlyComplementaryUpper)alerts.push({severity:'warning',rule:'G21 · interférence intra-journée',reason:`${high.length} contenus à forte intensité sont prévus le ${day}.`,action:'Conserver une seule priorité haute, regrouper les contenus compatibles dans une même séance ou séparer les séances.'});
  if(list.some(s=>sessionStimuli(s).includes('B'))&&list.some(s=>sessionStimuli(s).includes('BM')||s.templateId==='kilterintense'))
   alerts.push({severity:'critical',rule:'G21 · surcharge locale doigts',reason:`Travail doigts et bloc maximal intense sont regroupés le ${day}.`,action:'Séparer ces contenus de 48 à 72 h.'})
 });
 const p=(state.cycle?.primary||'').toLowerCase(),s=(state.cycle?.secondary||'').toLowerCase();
 if(p.includes('doigt')&&countStimulus(w,'B')<2)alerts.push({severity:'critical',rule:'G21 · facteur limitant',reason:'Le cycle cible les doigts mais moins de 2 stimuli spécifiques sont planifiés.',action:'Ajouter une deuxième séance doigts.'});
 if(s.includes('running')&&countStimulus(w,'D')<2)alerts.push({severity:'warning',rule:'G21 · objectif secondaire',reason:'Le running secondaire n’atteint pas le minimum hebdomadaire.',action:'Ajouter une séance facile ou justifier la réduction.'});
 const painful=allExecutedSessions().filter(x=>(x.execution?.pain||0)>=4);
 if(painful.length)alerts.push({severity:'critical',rule:'Sécurité · douleur',reason:`${painful.length} séance(s) récente(s) avec douleur ≥ 4/10.`,action:'Réévaluer les contenus avant publication.'});
 const critical=alerts.filter(a=>a.severity==='critical').length,warning=alerts.filter(a=>a.severity==='warning').length;
 let status='VALIDATED';if(w.adaptedVoluntarily)status='ADAPTED';else if(critical>=2)status='INVALID';else if(critical===1)status='ADJUST';else if(warning)status='WATCH';
 return {alerts,status,critical,warning}
}
function g21StatusLabel(s){return {VALIDATED:'Validée',WATCH:'Vigilance',ADJUST:'À ajuster',INVALID:'Non valide',ADAPTED:'Adaptée volontairement'}[s]||s}
function renderG21Status(w){const r=evaluateG21Week(w),c={VALIDATED:'valid',WATCH:'watch',ADJUST:'adjust',INVALID:'invalid',ADAPTED:'adapted'}[r.status];return `<div class="g21status ${c}"><div class="row"><div><b>${g21StatusLabel(r.status)}</b><div class="muted small">${r.critical} critique(s) · ${r.warning} vigilance(s)</div></div><span class="pill">${r.status}</span></div></div>`}

function saveWeek(n,status){
 const w=state.weeks.find(x=>x.number===n);
 w.comment=document.getElementById('weekComment')?.value||'';
 w.status=status;
 if(status==='PUBLISHED'){
  const fingerprint=weekPlanningFingerprint(w);
  const changed=fingerprint!==w.lastPublishedFingerprint;
  if(!w.publicationVersion)w.publicationVersion=1;
  else if(changed)w.publicationVersion+=1;
  w.lastPublishedFingerprint=fingerprint;
  w.publishedAt=new Date().toISOString();
  w.publicationNotice=changed?'Nouvelle version publiée':'Version existante republiée';
 }
 logAudit(status==='PUBLISHED'?'PUBLISH':'SAVE_DRAFT','WEEK',w.weekId||String(n),`Statut ${status}`);save();closeSheet();renderWeeks();toast(status==='PUBLISHED'?'Semaine publiée localement':'Semaine enregistrée');

}

 w.comment=document.getElementById('weekComment')?.value||'';
 w.adaptedVoluntarily=document.getElementById('adaptedVoluntary')?.checked||false;
 w.adaptationReason=document.getElementById('adaptationReason')?.value||'';
 const g21=evaluateG21Week(w);
 if(g21.status==='INVALID'&&!w.adaptedVoluntarily)return toast('Semaine non valide : corrige les alertes ou documente une adaptation volontaire');
 if(w.adaptedVoluntarily&&!w.adaptationReason.trim())return toast('La justification de l’adaptation volontaire est obligatoire');
 const missing=GUIDE_REQUIREMENTS.filter(r=>weekCount(r.domain,n)<r.min);
 if(missing.length&&!w.adaptedVoluntarily&&w.comment.trim().length<40)return toast(missing.length+' exigences manquent : commentaire de 40 caractères requis');
 w.g21Status=g21.status;saveWeek(n,'PUBLISHED')
}

function publishedWeeks(){
 const remote=(state.remoteWeeks||[]).filter(w=>w.status==='PUBLISHED');
 if(remote.length){
  const latestByNumber=new Map();
  remote.forEach(w=>{
   const current=latestByNumber.get(Number(w.number));
   if(!current||Number(w.publicationVersion||0)>Number(current.publicationVersion||0))latestByNumber.set(Number(w.number),w)
  });
  return [...latestByNumber.values()].sort((a,b)=>Number(a.number)-Number(b.number))
 }
 return state.weeks.filter(w=>w.status==='PUBLISHED')
}
function sessionDetails(s){
 const sets=s.structuredSets?'<div class="small">'+s.structuredSets.map((x,i)=>
   'S'+(i+1)+' '+x.role+': '+(x.load||'—')+' '+(x.loadMode||'')+' × '+(x.reps||'—')+
   ' · RIR '+(x.rir===''?'—':x.rir)+' · repos '+(x.rest||'—')+'s'
 ).join('<br>')+'</div>':'';
 const exercises=s.exercises?.length?'<div class="small">'+s.exercises.map(x=>
   x.name+' · '+(x.sets||'—')+' séries · '+(x.reps||x.hold||'—')+(x.hold?' s':'')
 ).join('<br>')+'</div>':'';
 const climb=s.climbing?'<div class="small">'+
   (s.climbing.angle?'Angle : '+s.climbing.angle+' · ':'')+
   s.climbing.problemCount+' blocs · '+s.climbing.attemptLimit+' essais max'+
   (s.climbing.targetGrade?' · cible '+s.climbing.targetGrade:'')+
   (s.climbing.technicalFocus?' · '+s.climbing.technicalFocus:'')+
   '</div>':'';
 return sets+exercises+climb+'<p class="muted small">'+(s.notes||'')+'</p>'
}
function findSession(sessionId){
 const remoteWeeks=publishedWeeks();
 for(const w of remoteWeeks){
  const s=(w.sessions||[]).find(x=>x.sessionId===sessionId);
  if(s)return {week:w,session:s}
 }
 const remoteNumbers=new Set(remoteWeeks.map(w=>Number(w.number)));
 for(const w of (state.weeks||[])){
  if(remoteNumbers.has(Number(w.number)))continue;
  const s=(w.sessions||[]).find(x=>x.sessionId===sessionId);
  if(s)return {week:w,session:s}
 }
 return null
}
function openAthleteSession(sessionId){
 const found=findSession(sessionId);if(!found)return toast('Séance introuvable');
 const s=found.session,schema=guideSchemaFor(s);
 if(schema.type==='CLIMBING')return openClimbingExecution(s);
 if(schema.type==='SETS'||schema.type==='TIMED_SETS'||schema.type==='REPEATERS')return openGuideSetExecution(s,schema);
 if(schema.type==='EXERCISES')return openExerciseExecution(s,schema);
 if(schema.type==='RUN'||schema.type==='RUN_INTERVALS')return openRunningExecution(s,schema);
 return openGenericExecution(s)
}

function formatPace(minutesPerKm){
 if(!Number.isFinite(minutesPerKm)||minutesPerKm<=0)return '—';
 const min=Math.floor(minutesPerKm);
 const sec=Math.round((minutesPerKm-min)*60);
 return `${min}:${String(sec===60?0:sec).padStart(2,'0')} min/km`;
}
function updateRunningCalculations(){
 const duration=+document.getElementById('runDuration')?.value||0;
 const distance=+document.getElementById('runDistance')?.value||0;
 const speed=duration>0&&distance>0?distance/(duration/60):0;
 const pace=distance>0&&duration>0?duration/distance:0;
 const speedEl=document.getElementById('runSpeedCalculated');
 const paceEl=document.getElementById('runPaceCalculated');
 if(speedEl)speedEl.textContent=speed?speed.toFixed(2)+' km/h':'—';
 if(paceEl)paceEl.textContent=pace?formatPace(pace):'—';
 return {speed,pace};
}

function renumberClimbingProblems(){

   const title=block.querySelector('b');

   block.querySelectorAll('[data-cname],[data-cgrade],[data-cflash],[data-csuccess],[data-cattempts],[data-ccomment]').forEach(el=>{
     for(const key of ['cname','cgrade','cflash','csuccess','cattempts','ccomment']){

}
function renderToday(){
 const dayMap=['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'];
 const today=dayMap[new Date().getDay()];
 const weeks=publishedWeeks();
 const sessions=weeks.flatMap(w=>(w.sessions||[]).filter(s=>s.day===today));
 let body='';
 if(!sessions.length){
   body='<div class="card"><p class="muted">Aucune séance publiée pour aujourd’hui.</p></div>';
 }else{
   body=sessions.map(s=>{
     return '<div class="athsession published sessionopen '+(s.execution?.completed?'complete':'')+'">'+
       '<b>'+s.title+'</b>'+(s.execution?.completed?'<span class="pill green" style="margin-left:6px">✓ Terminée</span>':'')+
       '<div class="sessionmeta"><span class="pill">'+(s.guide||'')+'</span><span class="pill">'+(s.duration||0)+' min</span></div>'+
       sessionDetails(s)+
       '<button class="btn full" onclick="openAthleteSession(\''+s.sessionId+'\')">'+(s.execution?.completed?'Modifier la saisie':'Commencer')+'</button>'+
       '</div>';
   }).join('');
 }
 athleteShell('<div class="muted">'+today+'</div><h1>Séances du jour</h1>'+body,'today')
}
function athlete(view){if(view==='checkup')return renderSunday();if(view==='today')return renderToday();if(view==='week')return renderAthleteWeek();if(view==='profile')return athleteShell(`<div class="sectiontitle"><div><h1>Mon évolution</h1><p class="muted">Performances, tests et mensurations.</p></div><button class="btn" onclick="openAthleteMeasurements()">Saisir mes mensurations</button></div>${trackingRangeBar()}${renderLatestAthleteMeasurements()}<h3>Haut du corps</h3><div class="chartgrid">${['pull1rm','dip1rm','pullReps','dipReps'].map(chartCard).join('')}</div><h3 style="margin-top:18px">Doigts et gainage</h3><div class="chartgrid">${['fingerMax','fingerRepeaters','coreFlexor','coreExtensor'].map(chartCard).join('')}</div><h3 style="margin-top:18px">Mesures physiques</h3><div class="chartgrid">${['weight','waist','chest','hips','armRelaxed','armContracted','thigh','calf'].map(chartCard).join('')}</div>`,'profile');renderDaily()}

function validateDailyCheckin(part){state.checkStatus[part]='VALIDATED';const c=state.checkins[part],date=nowIso();if(part==='morning')addOrReplaceDailyRecord('checkins',{date,source:'Check-in matin',sleep:c.sleep,sleepQuality:c.quality,fatigue:c.fatigue,stress:c.stress,energy:c.energy,motivation:c.motivation,pain:c.pain});else addOrReplaceDailyRecord('checkins',{date,source:'Check-in soir',fatigue:c.fatigue,pain:c.pain});save();renderDaily();toast(`Check-in ${part==='morning'?'du matin':'du soir'} validé`)}
function renderDaily(){athleteShell(`<div class="sectiontitle"><div><div class="muted">Bonjour Thibaud</div><h1>Check quotidien</h1></div><span class="pill green">Brouillon auto</span></div><div class="card ${state.checkStatus.morning==='VALIDATED'?'validatedCard':state.checkStatus.morning==='DRAFT'?'draftCard':''}"><div class="statusline">${state.checkStatus.morning==='VALIDATED'?'✓ Validé':'À remplir'}</div><h3>Matin</h3>${slider('Sommeil (h)','morning.sleep',state.checkins.morning.sleep,4,10,.1)}${slider('Qualité','morning.quality',state.checkins.morning.quality)}${slider('Humeur','morning.mood',state.checkins.morning.mood)}${slider('Fatigue','morning.fatigue',state.checkins.morning.fatigue)}${slider('Stress','morning.stress',state.checkins.morning.stress)}${slider('Énergie','morning.energy',state.checkins.morning.energy)}${slider('Motivation','morning.motivation',state.checkins.morning.motivation)}${slider('Courbatures','morning.soreness',state.checkins.morning.soreness)}${slider('Douleur','morning.pain',state.checkins.morning.pain)}<button class="btn full" onclick="validateDailyCheckin('morning')">Valider le matin</button></div><div class="card ${state.checkStatus.evening==='VALIDATED'?'validatedCard':state.checkStatus.evening==='DRAFT'?'draftCard':''}" style="margin-top:14px"><div class="statusline">${state.checkStatus.evening==='VALIDATED'?'✓ Validé':'À remplir'}</div><h3>Soir</h3>${slider('RPE journée','evening.rpe',state.checkins.evening.rpe)}${slider('Fatigue','evening.fatigue',state.checkins.evening.fatigue)}${slider('Courbatures','evening.soreness',state.checkins.evening.soreness)}${slider('Douleur','evening.pain',state.checkins.evening.pain)}${slider('Vélo (km)','evening.bike',state.checkins.evening.bike,0,60,1)}<button class="btn full" onclick="validateDailyCheckin('evening')">Valider le soir</button></div>`,'daily')}
function renderSunday(){const w=state.weekly;athleteShell(`<div class="sectiontitle"><div><div class="muted">Dimanche</div><h1>Check-up hebdomadaire</h1></div><span class="pill orange">Obligatoire</span></div><div class="card ${state.checkStatus.sunday==='VALIDATED'?'validatedCard':state.checkStatus.sunday==='DRAFT'?'draftCard':''}"><div class="statusline">${state.checkStatus.sunday==='VALIDATED'?'✓ Check-up validé':'À remplir'}</div><p class="muted">Toutes les mensurations doivent être confirmées chaque dimanche.</p><div class="measuregrid">${[['Poids (kg)','weight',w.weight],['Taille (cm)','waist',w.waist],['Poitrine (cm)','chest',w.chest],['Hanches (cm)','hips',w.hips],['Bras relâché (cm)','armRelaxed',w.armRelaxed],['Bras contracté (cm)','armFlexed',w.armFlexed],['Cuisse (cm)','thigh',w.thigh],['Mollet (cm)','calf',w.calf],['FC allongé','hrSupine',w.hrSupine],['FC debout','hrStanding',w.hrStanding]].map(x=>`<div class="field"><label>${x[0]}</label><input data-week="${x[1]}" type="number" step=".1" value="${x[2]}"></div>`).join('')}</div><div class="field"><label>Disponibilités semaine suivante</label><input data-week="availability" value="${w.availability}"></div><div class="field"><label>Douleur persistante</label><input data-week="pain" value="${w.pain}"></div><div class="field"><label>Commentaire général</label><textarea data-week="comment">${w.comment}</textarea></div><button class="btn full" onclick="saveSunday()">Valider le check-up du dimanche</button></div>`,'checkup')}
function saveSunday(){let ok=true;document.querySelectorAll('[data-week]').forEach(el=>{el.classList.remove('invalid');if(el.value.trim()===''){el.classList.add('invalid');ok=false}else state.weekly[el.dataset.week]=isNaN(el.value)?el.value:+el.value});if(!ok)return toast('Toutes les mesures obligatoires doivent être renseignées');state.checkStatus.sunday='VALIDATED';addOrReplaceDailyRecord('measurements',{date:nowIso(),source:'Check-up dimanche',weight:state.weekly.weight,waist:state.weekly.waist,chest:state.weekly.chest,hips:state.weekly.hips,armRelaxed:state.weekly.armRelaxed,armContracted:state.weekly.armFlexed,thigh:state.weekly.thigh,calf:state.weekly.calf,hrSupine:state.weekly.hrSupine,hrStanding:state.weekly.hrStanding});state.athlete.weight=state.weekly.weight;save();renderSunday();toast('Check-up hebdomadaire validé')}
